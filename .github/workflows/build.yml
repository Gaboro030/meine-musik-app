name: Build native apps

# Runs on every push to main and on demand. Builds Windows + Linux desktop
# bundles and an Android APK in parallel, native-per-platform (this is the
# actual answer to "cross-compile Tauri for Windows/Linux/Android from one
# machine" - you don't; you use one CI runner per target OS instead, which
# is exactly what GitHub Actions' matrix gives for free).
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            name: windows
          - platform: ubuntu-22.04
            name: ubuntu
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps (webkit2gtk etc.)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf build-essential curl wget file libssl-dev \
            libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable

      # Cargo-Registry + target/ cachen (Key ueber Cargo.lock) - spart auf
      # jedem Push die komplette Neu-Kompilierung aller Crates von Null.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend deps
        run: npm install

      - name: Generate app icons
        shell: bash
        run: |
          node scripts/make-placeholder-icon.mjs
          npx tauri icon icons-source.png

      # Muss VOR "Run Rust tests" stehen: Tauris build.rs prueft beim
      # Kompilieren (auch bei `cargo test`, nicht nur `cargo build`), ob
      # die als externalBin konfigurierten Sidecar-Binaries bereits unter
      # src-tauri/binaries/ existieren - sonst bricht schon der Build-Script
      # mit "resource path ... doesn't exist" ab, bevor ueberhaupt ein Test
      # laeuft (genau das ist auf CI passiert, als der Test-Schritt davor
      # stand).
      - name: Download yt-dlp + cloudflared sidecars
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          if [ "${{ matrix.name }}" = "windows" ]; then
            curl -L -o src-tauri/binaries/yt-dlp-x86_64-pc-windows-msvc.exe \
              https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe
            curl -L -o src-tauri/binaries/cloudflared-x86_64-pc-windows-msvc.exe \
              https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe
          else
            curl -L -o src-tauri/binaries/yt-dlp-x86_64-unknown-linux-gnu \
              https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp
            curl -L -o src-tauri/binaries/cloudflared-x86_64-unknown-linux-gnu \
              https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
            chmod +x src-tauri/binaries/yt-dlp-x86_64-unknown-linux-gnu \
              src-tauri/binaries/cloudflared-x86_64-unknown-linux-gnu
          fi

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build
        run: npm run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-app-${{ matrix.name }}
          path: dist-app/${{ matrix.name }}-*
          if-no-files-found: error

  android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # Android-SDK/NDK + 4 Rust-Targets + Gradle-Build sprengen auf dem
      # GH-Standard-Runner (~14 GB frei) irgendwann das Limit ("No space
      # left on device") - vorinstallierten, hier ungenutzten Kram
      # (.NET, GHC, CodeQL-Cache, Docker-Images) vorher wegwerfen.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h /

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK/NDK
        uses: android-actions/setup-android@v3

      # Gradle-Abhaengigkeiten cachen - das generierte Android-Projekt
      # (npx tauri android init) existiert erst nach diesem Schritt, aber
      # setup-gradle darf schon vorher stehen: es hoert sich beim ersten
      # ./gradlew-Aufruf automatisch ein.
      - uses: gradle/actions/setup-gradle@v3

      - name: Install NDK and export NDK_HOME
        run: |
          sdkmanager "ndk;26.1.10909125"
          echo "NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> "$GITHUB_ENV"

      - name: Install frontend deps
        run: npm install

      - name: Generate app icons
        run: |
          node scripts/make-placeholder-icon.mjs
          npx tauri icon icons-source.png

      - name: Init Android project
        run: npx tauri android init

      - name: Merge background-playback service into generated Android project
        run: node scripts/merge-android-extras.mjs

      - name: Build APK
        run: npm run build:android

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-app-android
          path: dist-app/android-*
          if-no-files-found: error
