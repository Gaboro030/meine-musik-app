<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>Mitmachen – Meine Musik</title>
  <link rel="stylesheet" href="/static/player.css" />
  <style>
    body { overflow: auto; padding: 16px; max-width: 560px; margin: 0 auto; }
    .guest-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
    .guest-header h1 { font-size: 1.3rem; font-weight: 800; }
    .guest-search {
      width: 100%;
      padding: 12px 16px;
      border-radius: 100px;
      border: 1px solid var(--sp-border);
      background: rgba(255,255,255,0.06);
      color: var(--sp-text);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      margin-bottom: 20px;
    }
    .guest-search::placeholder { color: var(--sp-muted-2); }
    .guest-section-title {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--sp-muted);
      margin: 24px 0 10px;
    }
    .guest-track-list { display: flex; flex-direction: column; gap: 4px; }
    .guest-track-row { display: flex; align-items: center; gap: 12px; padding: 8px; border-radius: var(--radius-sm); }
    .guest-track-row:hover { background: rgba(255,255,255,0.06); }
    .guest-track-thumb {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-sm);
      object-fit: cover;
      background: var(--sp-elevated);
      flex-shrink: 0;
    }
    .guest-track-info { flex: 1; min-width: 0; }
    .guest-track-title { font-size: 0.9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .guest-track-sub { font-size: 0.78rem; color: var(--sp-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .guest-add-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--sp-green);
      color: #000;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .guest-add-btn:active { transform: scale(0.94); }
    .guest-add-btn.done { background: var(--sp-text); }
    .guest-empty { color: var(--sp-muted-2); font-size: 0.85rem; padding: 20px 0; text-align: center; }
    .guest-party-card {
      background: var(--sp-elevated);
      border-radius: var(--radius-md);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 8px;
    }
    .guest-party-cover { width: 56px; height: 56px; border-radius: var(--radius-sm); object-fit: cover; background: var(--sp-elevated-hover); flex-shrink: 0; }
    .guest-party-info { flex: 1; min-width: 0; }
    .guest-party-title { font-weight: 700; font-size: 0.92rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .guest-party-artist { font-size: 0.8rem; color: var(--sp-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .guest-party-toggle { padding: 8px 16px; border-radius: 100px; background: var(--sp-green); color: #000; font-weight: 700; font-size: 0.82rem; flex-shrink: 0; }
    .guest-party-toggle.active { background: #fff; }
    .guest-skip-btn {
      padding: 8px 12px;
      border-radius: 100px;
      background: rgba(255,255,255,0.08);
      color: var(--sp-text);
      font-weight: 700;
      font-size: 0.82rem;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .guest-skip-btn.voted { background: rgba(241,94,108,0.25); color: #ff8a93; }
  </style>
</head>
<body>
  <div class="guest-header">
    <span style="font-size: 1.6rem;">🎵</span>
    <h1>Mitmachen</h1>
  </div>

  <div id="partyCard" class="guest-party-card hidden">
    <img id="partyCover" class="guest-party-cover" src="" alt="" />
    <div class="guest-party-info">
      <div id="partyTitle" class="guest-party-title">—</div>
      <div id="partyArtist" class="guest-party-artist">—</div>
    </div>
    <button type="button" id="skipVoteBtn" class="guest-skip-btn" title="Für Skip stimmen">⏭ <span id="skipVoteCount"></span></button>
    <button type="button" id="partyToggleBtn" class="guest-party-toggle">Mitfeiern</button>
  </div>

  <input type="text" id="guestSearch" class="guest-search" placeholder="🔍 Songs suchen und zur Warteschlange hinzufügen…" autocomplete="off" />

  <div class="guest-section-title">Warteschlange</div>
  <div id="guestQueueList" class="guest-track-list">
    <div class="guest-empty">Noch nichts in der Warteschlange.</div>
  </div>

  <div class="guest-section-title">Bibliothek</div>
  <div id="guestTrackList" class="guest-track-list"></div>

  <audio id="partyAudio" preload="none"></audio>

  <script>
    const PLACEHOLDER_COVER =
      "data:image/svg+xml;utf8," +
      encodeURIComponent(
        '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">' +
          '<rect width="200" height="200" fill="#282828"/>' +
          '<text x="50%" y="54%" font-size="70" text-anchor="middle" dominant-baseline="middle">🎵</text>' +
          "</svg>"
      );

    let allTracks = []; // {title, artist, cover, playlist, file}

    async function loadLibrary() {
      try {
        const res = await fetch("/api/library");
        const data = await res.json();
        const playlists = data.playlists || [];
        allTracks = [];
        playlists.forEach((pl) => {
          pl.tracks.forEach((t) => {
            allTracks.push({
              title: t.title,
              artist: t.artist,
              cover: t.cover,
              playlist: pl.name,
              file: t.file,
            });
          });
        });
      } catch (_) {
        allTracks = [];
      }
      renderTrackList("");
    }

    function renderTrackList(query) {
      const list = document.getElementById("guestTrackList");
      list.innerHTML = "";
      const q = query.trim().toLowerCase();
      const matches = q
        ? allTracks.filter((t) => `${t.title} ${t.artist || ""}`.toLowerCase().includes(q))
        : allTracks.slice(0, 40);

      if (!matches.length) {
        const empty = document.createElement("div");
        empty.className = "guest-empty";
        empty.textContent = q ? "Keine Treffer." : "Bibliothek ist leer.";
        list.appendChild(empty);
        return;
      }

      matches.forEach((t) => {
        const row = document.createElement("div");
        row.className = "guest-track-row";

        const img = document.createElement("img");
        img.className = "guest-track-thumb";
        img.src = t.cover || PLACEHOLDER_COVER;
        img.alt = "";

        const info = document.createElement("div");
        info.className = "guest-track-info";
        const title = document.createElement("div");
        title.className = "guest-track-title";
        title.textContent = t.title;
        const sub = document.createElement("div");
        sub.className = "guest-track-sub";
        sub.textContent = `${t.artist || "Unbekannter Interpret"} · ${t.playlist}`;
        info.append(title, sub);

        const addBtn = document.createElement("button");
        addBtn.type = "button";
        addBtn.className = "guest-add-btn";
        addBtn.textContent = "+";
        addBtn.title = "Zur Warteschlange hinzufügen";
        addBtn.addEventListener("click", () => addToQueue(t, addBtn));

        row.append(img, info, addBtn);
        list.appendChild(row);
      });
    }

    async function addToQueue(track, btn) {
      btn.disabled = true;
      try {
        const res = await fetch("/api/queue/add", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ playlist: track.playlist, file: track.file }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Fehlgeschlagen.");
        btn.textContent = "✓";
        btn.classList.add("done");
        setTimeout(() => {
          btn.textContent = "+";
          btn.classList.remove("done");
          btn.disabled = false;
        }, 1200);
      } catch (err) {
        btn.disabled = false;
        btn.textContent = "!";
        setTimeout(() => (btn.textContent = "+"), 1200);
      }
    }

    document.getElementById("guestSearch").addEventListener("input", (e) => {
      renderTrackList(e.target.value);
    });

    function renderQueue(queueList) {
      const list = document.getElementById("guestQueueList");
      list.innerHTML = "";
      if (!queueList.length) {
        const empty = document.createElement("div");
        empty.className = "guest-empty";
        empty.textContent = "Noch nichts in der Warteschlange.";
        list.appendChild(empty);
        return;
      }
      queueList.forEach((entry) => {
        const row = document.createElement("div");
        row.className = "guest-track-row";
        const img = document.createElement("img");
        img.className = "guest-track-thumb";
        img.src = entry.cover || PLACEHOLDER_COVER;
        img.alt = "";
        const info = document.createElement("div");
        info.className = "guest-track-info";
        const title = document.createElement("div");
        title.className = "guest-track-title";
        title.textContent = entry.title;
        const sub = document.createElement("div");
        sub.className = "guest-track-sub";
        sub.textContent = entry.artist || "Unbekannter Interpret";
        info.append(title, sub);
        row.append(img, info);
        list.appendChild(row);
      });
    }

    async function loadQueue() {
      try {
        const res = await fetch("/api/queue");
        const data = await res.json();
        renderQueue(data.queue || []);
      } catch (_) {
        // keep whatever was last shown
      }
    }

    /* ===== Party mode: mirror the host's currently playing track ===== */
    const partyCard = document.getElementById("partyCard");
    const partyCover = document.getElementById("partyCover");
    const partyTitle = document.getElementById("partyTitle");
    const partyArtist = document.getElementById("partyArtist");
    const partyToggleBtn = document.getElementById("partyToggleBtn");
    const partyAudio = document.getElementById("partyAudio");
    let partyState = null;
    let partyStateReceivedAt = 0; // Date.now() beim Empfang - Basis der Drift-Korrektur
    let followingParty = false;

    /* Wo steht der Host JETZT wirklich? state.position ist die Position
       zum SENDE-Zeitpunkt - bei laufender Wiedergabe seitdem weitergelaufen.
       Statt der Host-Systemuhr (state.updated - Uhren von Host und Gast
       gehen gerade übers Internet auseinander) zählt die lokal gemessene
       Zeit seit Empfang: frei von Uhren-Versatz, nur die einmalige
       Übertragungslatenz bleibt als kleiner konstanter Fehler übrig. */
    function expectedHostPosition() {
      if (!partyState) return 0;
      const base = partyState.position || 0;
      if (!partyState.playing) return base;
      return base + (Date.now() - partyStateReceivedAt) / 1000;
    }

    function syncPartyAudio() {
      const state = partyState;
      if (!followingParty || !state || !state.active || !state.stream_url) return;
      if (!partyAudio.src.endsWith(state.stream_url)) {
        partyAudio.src = state.stream_url;
        partyAudio.currentTime = expectedHostPosition();
      } else if (Math.abs(partyAudio.currentTime - expectedHostPosition()) > 1.5) {
        // Mehr als 1.5s neben dem Host - zurückschnappen.
        partyAudio.currentTime = expectedHostPosition();
      }
      if (state.playing && partyAudio.paused) partyAudio.play().catch(() => {});
      if (!state.playing && !partyAudio.paused) partyAudio.pause();
    }

    function applyPartyState(state) {
      partyState = state;
      partyStateReceivedAt = Date.now();
      if (!state || !state.active) {
        partyCard.classList.add("hidden");
        if (followingParty) {
          partyAudio.pause();
          followingParty = false;
          partyToggleBtn.classList.remove("active");
          partyToggleBtn.textContent = "Mitfeiern";
        }
        return;
      }
      partyCard.classList.remove("hidden");
      partyCover.src = state.cover || PLACEHOLDER_COVER;
      partyTitle.textContent = state.title || "—";
      partyArtist.textContent = state.artist || "Unbekannter Interpret";
      syncPartyAudio();
    }

    // Laufende Drift-Kontrolle zwischen zwei Sync-Events - fängt auch den
    // Fall ab, dass ein Seek/Play des Hosts im Funkloch verpasst wurde.
    setInterval(() => {
      if (followingParty) syncPartyAudio();
    }, 2000);

    /* ===== Skip-Abstimmung ===== */
    const skipVoteBtn = document.getElementById("skipVoteBtn");
    const skipVoteCount = document.getElementById("skipVoteCount");
    let hasVotedSkip = false;

    function applySkipVotes({ count, needed }) {
      skipVoteCount.textContent = count ? `${count}/${needed}` : "";
    }

    skipVoteBtn.addEventListener("click", async () => {
      if (!guestId) return;
      try {
        const res = await fetch("/api/party/skip-vote", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id: guestId }),
        });
        const data = await res.json();
        hasVotedSkip = !!data.voted;
        skipVoteBtn.classList.toggle("voted", hasVotedSkip);
        applySkipVotes(data);
      } catch (_) {}
    });

    partyToggleBtn.addEventListener("click", () => {
      followingParty = !followingParty;
      partyToggleBtn.classList.toggle("active", followingParty);
      partyToggleBtn.textContent = followingParty ? "Läuft mit ⏸" : "Mitfeiern";
      if (followingParty && partyState) {
        applyPartyState(partyState);
      } else {
        partyAudio.pause();
      }
    });

    /* ===== Live updates via the shared SSE bus =====
       Robust gegen Netzwerkwechsel (WLAN -> Mobilfunk): EventSource
       reconnectet zwar von selbst bei kurzen Aussetzern, stirbt bei einem
       echten Interface-Wechsel aber oft still und endgültig. Deshalb:
       expliziter Neuaufbau mit Backoff bei onerror, sofortiger Neuaufbau
       bei "online"/Tab-Rückkehr, und nach jedem (Re-)Connect einmal
       Zustand + Warteschlange frisch ziehen - was während der Lücke
       passiert ist, wäre sonst für immer verpasst. */
    let events = null;
    let reconnectTimer = null;
    let reconnectDelay = 1000;

    /* Anwesenheit: einmal joinen (Name bleibt im localStorage, id auch -
       Reconnects frischen denselben Eintrag auf statt zu duplizieren),
       dann alle 20s ein Heartbeat. Antwortet der Server mit ok:false,
       kennt er die id nicht mehr (Neustart) - dann neu joinen. */
    let guestId = localStorage.getItem("partyGuestId") || null;

    function guestName() {
      let name = localStorage.getItem("partyGuestName");
      if (!name) {
        name = "Gast-" + Math.floor(100 + Math.random() * 900);
        localStorage.setItem("partyGuestName", name);
      }
      return name;
    }

    async function joinParty() {
      try {
        const res = await fetch("/api/party/join", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name: guestName(), id: guestId }),
        });
        const data = await res.json();
        if (data.id) {
          guestId = data.id;
          localStorage.setItem("partyGuestId", guestId);
        }
      } catch (_) {}
    }

    setInterval(async () => {
      if (!guestId) return;
      try {
        const res = await fetch("/api/party/heartbeat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id: guestId }),
        });
        const data = await res.json();
        if (data && data.ok === false) joinParty();
      } catch (_) {}
    }, 20000);

    function refreshFromServer() {
      fetch("/api/party/state")
        .then((r) => r.json())
        .then(applyPartyState)
        .catch(() => {});
      loadQueue();
      joinParty();
    }

    function connectEvents() {
      if (!("EventSource" in window)) return;
      if (events) {
        try { events.close(); } catch (_) {}
      }
      events = new EventSource("/api/events");
      events.addEventListener("open", () => {
        reconnectDelay = 1000;
        refreshFromServer();
      });
      events.addEventListener("queue_update", (e) => {
        try {
          renderQueue(JSON.parse(e.data).queue || []);
        } catch (_) {}
      });
      events.addEventListener("party_sync", (e) => {
        try {
          applyPartyState(JSON.parse(e.data));
        } catch (_) {}
      });
      events.addEventListener("skip_votes", (e) => {
        try {
          const data = JSON.parse(e.data);
          // Neuer Track (Server setzt bei Trackwechsel auf 0 zurueck) -
          // eigener "hasVotedSkip"-Status muss das mitmachen, sonst zeigt
          // der Button faelschlich "schon abgestimmt" fuer den neuen Song.
          if (data.count === 0) {
            hasVotedSkip = false;
            skipVoteBtn.classList.remove("voted");
          }
          applySkipVotes(data);
        } catch (_) {}
      });
      events.addEventListener("error", () => {
        // CONNECTING heißt: der Browser versucht selbst zu reconnecten -
        // dann nicht dazwischenfunken. CLOSED heißt endgültig tot.
        if (events.readyState === EventSource.CLOSED) {
          clearTimeout(reconnectTimer);
          reconnectTimer = setTimeout(connectEvents, reconnectDelay);
          reconnectDelay = Math.min(reconnectDelay * 2, 10000);
        }
      });
    }

    window.addEventListener("online", () => {
      clearTimeout(reconnectTimer);
      connectEvents();
    });
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState !== "visible") return;
      // Nach Rückkehr aus dem Hintergrund kann die Verbindung tot sein,
      // ohne je ein error-Event geliefert zu haben - im Zweifel neu.
      if (!events || events.readyState === EventSource.CLOSED) {
        connectEvents();
      } else {
        refreshFromServer();
      }
    });

    connectEvents();
    refreshFromServer();

    loadLibrary();
    loadQueue();
  </script>
</body>
</html>
